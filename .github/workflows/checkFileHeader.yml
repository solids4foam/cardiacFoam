name: Check Header for Added and Modified Files

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check_added_files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check headers on tracked C/H files
        shell: bash
        run: |
          set -euo pipefail

          script=./applications/scripts/cardiacFoamChangeCopyright.sh
          chmod +x "$script"

          mapfile -t files_to_check < <(git ls-files '*.C' '*.H')

          if [ "${#files_to_check[@]}" -eq 0 ]; then
            echo "No tracked C/H files to check."
            exit 0
          fi

          missing_header=0

          for file in "${files_to_check[@]}"; do
            echo "Checking: $file"

            if ! grep -qE 'This file is part of (cardiacFoam|solids4foam)\.' "$file"; then
              echo "❌ Missing recognized project header: $file"
              missing_header=1
              continue
            fi

            # Run the normalizer script as a consistency check. It exits 1 when
            # it would rewrite the file, so do not fail immediately here.
            "$script" "$file" || true
          done

          if [ "$missing_header" -ne 0 ]; then
            echo "One or more tracked files are missing the required project header."
            exit 1
          fi

          if ! git diff --exit-code -- "${files_to_check[@]}"; then
            echo "❌ Header formatting drift detected."
            echo "Run the fixer locally:"
            echo "  ./applications/scripts/cardiacFoamChangeCopyright.sh <file>"
            exit 1
          fi

          echo "✅ Headers look correct."
